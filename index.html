        
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COD: Ghosts Leaderboards</title>
    <style>
        body { background-color: #131416; color: #eeeeee; font-family: Arial, sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1100px; margin: 0 auto; background-color: #1b1d20; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); overflow: hidden; }
        .header { padding: 20px; border-bottom: 4px solid #ea580c; display: flex; flex-direction: column; gap: 15px; }
        
        /* BANNER COM A FOTO DO GHOST */
        .game-banner { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .ghost-img { width: 90px; height: 120px; object-fit: cover; border-radius: 6px; border: 2px solid #3f3f46; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        .game-title { font-size: 24px; font-weight: bold; text-transform: uppercase; margin: 0; color: #ffffff; tracking: 1px; }
        .platform-text { color: #a1a1aa; font-size: 13px; margin: 5px 0 0 0; }
        
        /* BOTÕES */
        .btn { padding: 10px 16px; border: none; border-radius: 4px; font-weight: bold; font-size: 13px; cursor: pointer; color: white; display: inline-flex; align-items: center; gap: 5px; }
        .btn-green { background-color: #16a34a; }
        .btn-green:hover { background-color: #15803d; }
        .btn-zinc { background-color: #27272a; color: #e4e4e7; border: 1px solid #3f3f46; }
        .btn-zinc:hover { background-color: #3f3f46; }
        .btn-orange { background-color: #ea580c; color: white; }
        .btn-purple { background-color: #7c3aed; color: white; }
        
        /* LAYOUT LATERAL + TABELA */
        .main-content { display: flex; flex-direction: column; }
        @media(min-width: 768px) { .main-content { flex-direction: row; } }
        
        .sidebar { background-color: #161719; width: 100%; padding: 15px; box-sizing: border-box; border-bottom: 1px solid #27272a; }
        @media(min-width: 768px) { .sidebar { width: 260px; border-bottom: none; border-right: 1px solid #27272a; min-height: 450px; } }
        
        .sidebar-btn { display: block; width: 100%; text-align: left; background: none; border: none; color: #a1a1aa; padding: 12px 10px; font-size: 13px; cursor: pointer; border-radius: 4px; margin-bottom: 5px; transition: 0.2s; }
        .sidebar-btn:hover { background-color: #202225; color: #fff; }
        .sidebar-btn.active { background-color: #27272a; color: #ffffff; border-left: 4px solid #ea580c; font-weight: bold; }
        
        .leaderboard-area { flex: 1; padding: 20px; width: 100%; box-sizing: border-box; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th { border-bottom: 2px solid #3f3f46; color: #a1a1aa; padding: 12px 10px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 14px 10px; border-bottom: 1px solid #27272a; }
        .row-even { background-color: #181a1d; }
        .row-odd { background-color: #1f2125; }
        
        /* JANELAS MODAIS POP-UP */
        .modal { display: none; position: fixed; inset: 0; background-color: rgba(0,0,0,0.85); justify-content: center; align-items: center; padding: 15px; z-index: 100; }
        .modal-content { background-color: #1b1d20; max-width: 500px; width: 100%; padding: 25px; border-radius: 8px; border: 1px solid #3f3f46; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0,0,0,0.7); }
        .modal-title { font-size: 20px; font-weight: bold; margin-top: 0; margin-bottom: 20px; color: #ffffff; border-bottom: 1px solid #27272a; padding-bottom: 10px; }
        
        /* CONFIGURAÇÃO DOS FORMULÁRIOS */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: #p1a1aa; color: #cbd5e1; }
        .form-control { width: 100%; background-color: #09090b; border: 1px solid #3f3f46; padding: 10px; border-radius: 4px; color: white; box-sizing: border-box; font-size: 14px; transition: 0.2s; }
        .form-control:focus { border-color: #ea580c; outline: none; }
    </style>
</head>
<body>

    <div class="container">
        <!-- CABEÇALHO -->
        <div class="header">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <!-- FOTO E TÍTULO DO JOGO -->
                <div class="game-banner">
                    <img src="https://unsplash.com" alt="Ghost COD" class="ghost-img">
                    <div>
                        <h1 class="game-title">🪖 Call of Duty: Ghosts</h1>
                        <p class="platform-text">Plataformas: PC / PS4 / Xbox One / PS3 / X360</p>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button onclick="openModal('submeter')" class="btn btn-green">🚀 Enviar Run</button>
                    <button onclick="openModal('admin')" class="btn btn-zinc">⚙️ Painel Admin</button>
                </div>
            </div>
            
            <!-- MENU DE MODOS -->
            <div style="display: flex; gap: 10px; border-bottom: 1px solid #27272a; padding-bottom: 5px; margin-top: 10px;">
                <button onclick="changeMode('campanha')" id="m-btn-c" class="btn btn-orange">Modo Campanha</button>
                <button onclick="changeMode('extincao')" id="m-btn-e" class="btn btn-zinc">Modo Extinção</button>
                <button onclick="openModal('regras')" class="btn btn-zinc" style="margin-left: auto;">📜 Ver Regras</button>
            </div>
        </div>

        <!-- CONTEÚDO -->
        <div class="main-content">
            <div class="sidebar" id="sidebar-mapas"></div>
            <div class="leaderboard-area">
                <h2 style="font-size: 18px; margin: 0; color: #ffffff;" id="txt-titulo-categoria">Campanha: Todas as Missões (Any%)</h2>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 70px; text-align: center;">Rank</th>
                                <th>Jogador</th>
                                <th>Tempo</th>
                                <th>Plataforma</th>
                                <th style="text-align: center;">Vídeo</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-rows"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: ENVIAR RUN -->
    <div id="modal-submeter" class="modal">
        <div class="modal-content">
            <h3 class="modal-title">🚀 Enviar Novo Recorde</h3>
            <form id="form-run">
                <div class="form-group"><label>Seu Nome / Nick:</label><input type="text" id="run-player" required class="form-control" placeholder="Ex: DaviGhosts"></div>
                <div class="form-group"><label>Selecione a Missão / Mapa:</label><select id="run-map-select" class="form-control"></select></div>
                <div class="form-group"><label>Seu Tempo Final:</label><input type="text" id="run-time" required placeholder="Ex: 15m 30s ou 02h 40m" class="form-control"></div>
                <div class="form-group"><label>Sua Plataforma:</label><select id="run-platform" class="form-control"><option value="PC">PC</option><option value="PS4">PS4</option><option value="Xbox One">Xbox One</option><option value="PS3">PS3</option><option value="Xbox 360">Xbox 360</option></select></div>
                <div class="form-group"><label>Link do Vídeo de Prova (YouTube ou Twitch):</label><input type="url" id="run-video" required placeholder="https://youtube.com..." class="form-control"></div>
                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                    <button type="button" onclick="closeModal('submeter')" class="btn btn-zinc">Cancelar</button>
                    <button type="submit" class="btn btn-green">Enviar para Moderação</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL: REGRAS -->
    <div id="modal-regras" class="modal">
        <div class="modal-content">
            <h3 class="modal-title">📜 Diretrizes do Ranking</h3>
            <div id="texto-regras" style="font-size: 14px; color: #cbd5e1; white-space: pre-line; line-height: 1.6;"></div>
            <button type="button" onclick="closeModal('regras')" class="btn btn-zinc" style="width: 100%; margin-top: 20px; justify-content: center;">Fechar</button>
        </div>
    </div>

    <!-- MODAL: ADMIN -->
    <div id="modal-admin" class="modal">
        <div class="modal-content" style="max-width: 650px;">
            <h3 class="modal-title">⚙️ Painel do Moderador</h3>
            <div style="background-color: #161719; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #27272a;">
                <label style="font-size: 13px; color: #a1a1aa; display: block; margin-bottom: 6px; font-weight: bold;">Editar Regras do Site:</label>
                <textarea id="edit-regras-input" rows="3" class="form-control"></textarea>
                <button type="button" onclick="salvarRegrasLocal()" class="btn btn-orange" style="margin-top: 10px; font-size: 12px; padding: 6px 12px;">Salvar Novas Regras</button>
            </div>
            <h4 style="font-size: 14px; margin: 0 0 12px 0; color: #ffffff;">⏳ Runs de Amigos Aguardando Aprovação:</h4>
            <div class="table-responsive">
                <table style="font-size: 13px; width: 100%;">
